# ──────────────────────────────────────────────────────────────────────────────
# Event System V1 — Spring Boot configuration
#
# All tunables MUST live under the eventsystem.* namespace and be bound
# via @ConfigurationProperties.
# ──────────────────────────────────────────────────────────────────────────────
spring:
  application:
    name: event-system

  datasource:
    url: ${DB_URL}${DB_IP}:${DB_PORT}/eventsystem_db?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

eventsystem:
  security:
    # HMAC-SHA256 secret for signing JWTs. MUST be at least 32 bytes (256 bits).
    # Override via env var EVENTSYSTEM_SECURITY_JWT_SECRET in production.
    jwt-secret: ${JWT_SECRET}
    # ISO-8601 duration. PT1H = 1 hour.
    token-validity: PT1H
    # BCrypt cost factor. 12 is the production default; tests use 4 for speed.
    bcrypt-strength: 12

  recovery:
    # Background sweeper that releases inventory held by abandoned (expired) reservations.
    enabled: true
    # Wait this long after start-up before the first sweep (lets the context finish booting).
    initial-delay-ms: 15000
    # Delay between the end of one sweep and the start of the next.
    sweep-interval-ms: 60000

  bootstrap:
    enabled: true
    default-reservation-timeout: PT15M
    queue-load-threshold: 100
    admin:
      username: ${ADMIN_USERNAME}
      password: ${ADMIN_PASSWORD}
      first-name: ${ADMIN_FIRST_NAME}
      last-name: ${ADMIN_LAST_NAME}
      email: ${ADMIN_EMAIL}
      date-of-birth: ${ADMIN_DOB}
  startup:
    # Explicit startup mode:
    # EMPTY_DB    = reset DB and bootstrap required admin/platform only
    # EXISTING_DB = keep existing DB and validate required admin/platform
    # INIT_FILE   = reset DB, bootstrap required admin/platform, then replay init file
    mode: ${STARTUP_MODE:EXISTING_DB}
    init-state-file: ${INIT_STATE_FILE:}
    validate-external-systems: ${VALIDATE_EXTERNAL_SYSTEMS:true}

  # Optional initial-state loader (V3 §2.a.ii). When enabled, the file at
  # 'state-file' is replayed once at startup as a single all-or-nothing
  # transaction. Disabled by default so normal startup is unaffected.
  # Override via env vars EVENTSYSTEM_INIT_ENABLED / EVENTSYSTEM_INIT_STATE_FILE.
  # Deprecated compatibility block.
  # New startup flow uses eventsystem.startup.mode=INIT_FILE and
  # eventsystem.startup.init-state-file.
  # TODO: remove after startup mode migration is complete.
  init:
    enabled: ${INIT_ENABLED:false}
    state-file: ${INIT_STATE_FILE:}

logging:
  level:
    root: INFO
    com.eventsystem: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

wsep:
  base-url: ${WSEP_BASE_URL:https://damp-lynna-wsep-1984852e.koyeb.app/}
  connect-timeout: 3s
  read-timeout: 5s