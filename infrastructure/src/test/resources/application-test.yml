spring:
  main:
    web-application-type: none
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
        hibernate:
          # Forces Hibernate to output SMALLINT instead of TINYINT globally for tests
          type:
            numeric_boolean: org.hibernate.type.descriptor.java.BooleanJavaType
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    
eventsystem:
  security:
    jwt-secret: "test_test_test_test_test_test_te"
    token-validity: PT5M
    bcrypt-strength: 4
  recovery:
    enabled: false
  bootstrap:
    enabled: false
    default-reservation-timeout: PT15M
    queue-load-threshold: 100
    admin:
      username: testadmin
      password: testadmin123
      first-name: Test
      last-name: Admin
      email: testadmin@local
      date-of-birth: 1990-01-01
logging:
  level:
    root: WARN
    com.eventsystem: INFO

wsep:
  base-url: http://localhost:9999/
  connect-timeout: 1s
  read-timeout: 1s